name: Build Linux Release

on:
  workflow_dispatch:
  release:
    types: [created] # Triggers automatically when you create a GitHub Release

jobs:
  build-linux:
    name: Build and Package for Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package

      - name: Package with jpackage
        run: |
          jpackage \
            --type app-image \
            --name "github-loc-linux-v1.0" \
            --input target/ \
            --main-jar githubloc-1.0.jar \
            --main-class dev.sonle.githubloc.App \
            --add-modules java.base,java.desktop,java.net.http,java.sql \
            --jlink-options "--bind-services" \
            --dest release/

      - name: Compress Linux App Image
        run: |
          cd release
          
          # Print the contents of the release folder to the action logs for debugging
          echo "Contents of the release folder:"
          ls -la
          
          # Use a wildcard (*/) to dynamically grab whatever directory jpackage generated
          tar -czvf github-loc-linux.tar.gz */

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-loc-linux-build
          path: release/github-loc-linux.tar.gz
          
      # If triggered by a release, attach the tar.gz directly to the GitHub Release
      # - name: Upload to GitHub Release
      #   if: github.event_name == 'release'
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: release/github-loc-linux.tar.gz