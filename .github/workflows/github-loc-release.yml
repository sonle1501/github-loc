name: Build and Release github-loc

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
  release:
    types: [published, created, edited] # Triggers when you draft, publish, or edit a release

env:
  VERSION: "v1.0"

permissions:
  contents: write

jobs:
  build:
    # Workflow is triggered in 3 scenarios:
    # + Manually run the workflow
    # + Release event
    # + Accept a pull request
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'release' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package

      - name: Package with jpackage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage --type app-image \
            --name "github-loc-linux-${{ env.VERSION }}" \
            --input target/ \
            --main-jar githubloc-1.0.jar \
            --main-class dev.sonle.githubloc.App \
            --add-modules java.base,java.desktop,java.net.http,java.sql \
            --jlink-options "--bind-services" \
            --dest release/

      - name: Package with jpackage (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          jpackage --type app-image `
            --name "github-loc-windows-${{ env.VERSION }}" `
            --input target/ `
            --main-jar githubloc-1.0.jar `
            --main-class dev.sonle.githubloc.App `
            --win-console `
            --add-modules java.base,java.desktop,java.net.http,java.sql `
            --jlink-options "--bind-services" `
            --dest release/

      - name: Compress Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd release
          tar -czvf "github-loc-linux-${{ env.VERSION }}.tar.gz" */

      - name: Compress Windows Artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd release
          Compress-Archive -Path * -DestinationPath "github-loc-windows-${{ env.VERSION }}.zip" -Force
     
      # add or update new artifacts to the release section
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}  # v1.0 
          name: Release ${{ env.VERSION }}
          files: |
            release/*.tar.gz  
            release/*.zip