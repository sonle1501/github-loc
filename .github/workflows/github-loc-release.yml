name: Build and Release github-loc

on:
  release:
    types: [published, created]
  workflow_dispatch:

# Set the version as a global variable for easy updates
env:
  VERSION: "v1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package

      - name: Package with jpackage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage --type app-image \
            --name "github-loc-linux-${{ env.VERSION }}" \
            --input target/ \
            --main-jar githubloc-1.0.jar \
            --main-class dev.sonle.githubloc.App \
            --add-modules java.base,java.desktop,java.net.http,java.sql \
            --jlink-options "--bind-services"`
            --dest release/

      - name: Package with jpackage (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          jpackage --type app-image `
            --name "github-loc-windows-${{ env.VERSION }}" `
            --input target/ `
            --main-jar githubloc-1.0.jar `
            --main-class dev.sonle.githubloc.App `
            --win-console `
            --add-modules java.base,java.desktop,java.net.http,java.sql `
            --jlink-options "--bind-services"`
            --dest release/

      - name: Compress Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd release
          # Compresses the folder into github-loc-linux-v-1.0.tar.gz
          tar -czvf "github-loc-linux-${{ env.VERSION }}.tar.gz" */

      - name: Compress Windows Artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd release
          # Compresses the folder into github-loc-windows-v-1.0.zip
          Compress-Archive -Path * -DestinationPath "github-loc-windows-${{ env.VERSION }}.zip" -Force

      # If triggered by a release, attach the tar.gz and .zip directly to the GitHub Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            release/*.tar.gz
            release/*.zip